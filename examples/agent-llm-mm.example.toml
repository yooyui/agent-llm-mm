transport = "stdio"
# macOS 示例:
database_url = "sqlite:///Users/<you>/Library/Application%20Support/agent-llm-mm-codex.sqlite"

[model]
provider = "openai-compatible"

[model.openai_compatible]
base_url = "https://api.openai.com/v1"
api_key = "REPLACE_WITH_YOUR_API_KEY"
model = "gpt-4o-mini"
timeout_ms = 30000

[dashboard]
enabled = true
host = "127.0.0.1"
port = 8787
base_path = "/"
event_capacity = 2000
sse_enabled = true
open_browser = false
required = false
